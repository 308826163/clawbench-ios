name: Build iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets (iOS only, desktop code tree-shaken)
        run: npm run build:ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS App
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (unsigned, for TrollStore)
        run: |
          mkdir -p ios/App/build/ipa/Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app ios/App/build/ipa/Payload/
          cd ios/App/build/ipa
          zip -r ClawBench.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawBench-iOS
          path: ios/App/build/ipa/ClawBench.ipa
          retention-days: 30
